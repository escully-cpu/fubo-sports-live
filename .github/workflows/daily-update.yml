name: Daily Sports Page Update

on:
  schedule:
    # 8:00 AM ET every day (12:00 UTC — accounts for EDT; adjust to 13:00 for EST)
    - cron: '0 12 * * *'
  workflow_dispatch:  # allow manual trigger

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install anthropic

      - name: Regenerate page
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python update_page.py

      - name: Commit updated page
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          git diff --cached --quiet || git commit -m "chore: daily sports page refresh $(date -u '+%Y-%m-%d')"
          git push
